# ~/.config/walker/config.toml
# Linuc dotfiles — walker v2 (schema real: github.com/abenz1267/walker/blob/master/resources/config.toml)

theme = "linuc"
as_window = false                # roda como layer-shell (não janela normal) — correto pro Hyprland
single_click_activation = true
close_when_open = true
click_to_close = true
selection_wrap = true
global_argument_delimiter = "#"
exact_search_prefix = "'"
ext_background_effect_blur = true

[placeholders.default]
input = "Buscar apps, arquivos, cálculos..."
list = "Nada encontrado"

[[providers.prefixes]]
provider = "websearch"
prefix = "?"

[[providers.prefixes]]
provider = "calc"
prefix = "="

[[providers.prefixes]]
provider = "providerlist"
prefix = "_"

[keybinds]
quick_activate = ["F1", "F2", "F3", "F4", "F5"]
