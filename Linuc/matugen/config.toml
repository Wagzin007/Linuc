# ~/.config/matugen/config.toml
# Gera Material You a partir do wallpaper e escreve nos templates abaixo.

[config]
reload_apps = true

[templates.hyprland]
input_path = "~/.config/matugen/templates/hypr-colors.lua"
output_path = "~/.config/hypr/colors.lua"

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/colors.conf"

[templates.waybar]
input_path = "~/.config/matugen/templates/waybar-colors.css"
output_path = "~/.config/waybar/colors.css"

[templates.gtk3]
input_path = "~/.config/matugen/templates/gtk.css"
output_path = "~/.config/gtk-3.0/gtk.css"

[templates.gtk4]
input_path = "~/.config/matugen/templates/gtk.css"
output_path = "~/.config/gtk-4.0/gtk.css"

[templates.dunst]
input_path = "~/.config/matugen/templates/dunstrc"
output_path = "~/.config/dunst/dunstrc"

[templates.hyprlock]
input_path = "~/.config/matugen/templates/hyprlock.conf"
output_path = "~/.config/hypr/hyprlock.conf"

[templates.sddm]
input_path = "~/.config/matugen/templates/sddm-theme.conf.user"
output_path = "~/.cache/linuc/sddm-theme.conf.user"
